name: iOS IPA Derle

# Bu workflow bir macOS runner uzerinde calisir (Xcode gerektigi icin).
# GitHub Actions'in macOS runner'lari Xcode'u onceden kurulu getirir;
# sizin Mac veya Xcode kurmaniza gerek yoktur.
#
# ONEMLI: Apple, imzali (App Store'a yuklenebilir) bir .ipa uretebilmek
# icin GERCEK bir Apple Developer Program uyeligi (yillik $99) ve o hesaptan
# uretilmis bir Distribution sertifikasi + provisioning profile ister.
# Bu bilgiler yalnizca SIZIN Apple Developer hesabinizdan alinabilir; bu
# workflow bunlari sizin yerinize "uretemez". Asagidaki 5 secret
# tanimlanmadigi surece bu workflow, projenin Xcode'da SORUNSUZ ACILDIGINI
# VE DERLENDIGINI dogrulamak icin yalnizca bir SIMULATOR derlemesi (duman
# testi) yapar. Secret'lar eklendiginde otomatik olarak gercek, imzali,
# App Store'a yuklenebilir bir .ipa uretir.
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      bundle_id:
        description: 'Bundle Identifier (bos birakilirsa capacitor.config.json degeri kullanilir)'
        required: false
        default: ''
      marketing_version:
        description: 'Versiyon numarasi (orn. 1.0.0)'
        required: false
        default: '1.0.0'
      build_number:
        description: 'Build numarasi (orn. 1)'
        required: false
        default: ''
  release:
    types: [ created ]

permissions:
  contents: write

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14

    steps:
      - name: Kodu al (checkout)
        uses: actions/checkout@v4

      - name: Xcode surumunu sec
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: NPM bagimliliklarini kur
        run: npm install

      - name: Capacitor iOS platformunu ekle (tazece uretilir)
        run: npx cap add ios

      - name: Uygulama ikonu ve splash screen gorsellerini uret
        run: npx capacitor-assets generate --ios

      - name: Reklam kimliklerini (AdMob) projeye isle
        run: python3 scripts/patch-ads.py

      - name: Podfile'i yamala (Pods hedeflerinde kod imzalamayi devre disi birak)
        run: python3 scripts/patch-podfile.py

      - name: CocoaPods bagimliliklarini da iceren senkronizasyon
        run: npx cap sync ios

      - name: iOS projesini duzenle (Privacy Manifest, Info.plist, ekran yonleri)
        run: python3 scripts/patch-ios.py

      - name: Privacy Manifest'i Xcode projesine gercekten kaydet (Copy Bundle Resources)
        run: |
          gem install xcodeproj --no-document
          ruby scripts/add_privacy_manifest_to_xcodeproj.rb

      - name: Derleme parametrelerini belirle
        id: params
        run: |
          BUNDLE_ID="${{ github.event.inputs.bundle_id }}"
          if [ -z "$BUNDLE_ID" ]; then
            BUNDLE_ID=$(node -p "require('./capacitor.config.json').appId")
          fi
          VERSION="${{ github.event.inputs.marketing_version }}"
          if [ -z "$VERSION" ]; then VERSION="1.0.0"; fi
          BUILD_NUM="${{ github.event.inputs.build_number }}"
          if [ -z "$BUILD_NUM" ]; then BUILD_NUM="${{ github.run_number }}"; fi
          echo "bundle_id=$BUNDLE_ID" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUM" >> "$GITHUB_OUTPUT"
          echo "Bundle ID: $BUNDLE_ID / Version: $VERSION / Build: $BUILD_NUM"

      - name: Imzalama sirlari mevcut mu kontrol et
        id: signing-check
        run: |
          if [ -n "${{ secrets.IOS_DIST_CERT_BASE64 }}" ] && [ -n "${{ secrets.IOS_DIST_CERT_PASSWORD }}" ] && [ -n "${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}" ] && [ -n "${{ secrets.IOS_TEAM_ID }}" ] && [ -n "${{ secrets.IOS_PROFILE_NAME }}" ]; then
            echo "has_signing=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
          fi

      # ============ SECRET'LAR YOKSA: SIMULATOR DUMAN TESTI ============
      - name: "[Imzasiz mod] Simulator icin derle (proje saglik kontrolu)"
        if: steps.signing-check.outputs.has_signing == 'false'
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            MARKETING_VERSION="${{ steps.params.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.params.outputs.build_number }}" \
            build | xcpretty || true
          echo "### ⚠️ İmzasız Mod (Duman Testi)" >> "$GITHUB_STEP_SUMMARY"
          echo "Apple imzalama sirlari (secrets) tanimlanmadigi icin gercek bir .ipa uretilmedi." >> "$GITHUB_STEP_SUMMARY"
          echo "Bunun yerine proje simulator icin basariyla derlendi mi diye kontrol edildi (yukaridaki log)." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**App Store'a yuklenebilir gercek bir .ipa icin gerekli 5 secret:**" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`IOS_DIST_CERT_BASE64\`, \`IOS_DIST_CERT_PASSWORD\`, \`IOS_PROVISION_PROFILE_BASE64\`, \`IOS_TEAM_ID\`, \`IOS_PROFILE_NAME\`" >> "$GITHUB_STEP_SUMMARY"
          echo "(Detayli adimlar icin README.md dosyasina bakin.)" >> "$GITHUB_STEP_SUMMARY"

      # ============ SECRET'LAR VARSA: GERÇEK İMZALI .IPA ============
      - name: "[İmzalı mod] Sertifika ve provisioning profile kur"
        if: steps.signing-check.outputs.has_signing == 'true'
        env:
          CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain

          echo "$CERT_BASE64" | base64 -d > certificate.p12
          security import certificate.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f certificate.p12

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: "[İmzalı mod] Arşivle (xcodebuild archive)"
        if: steps.signing-check.outputs.has_signing == 'true'
        env:
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.IOS_PROFILE_NAME }}
        run: |
          set -o pipefail
          if xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            PRODUCT_BUNDLE_IDENTIFIER="${{ steps.params.outputs.bundle_id }}" \
            MARKETING_VERSION="${{ steps.params.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.params.outputs.build_number }}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            archive 2>&1 | tee /tmp/archive.log | xcpretty; then
            ARCHIVE_OK=1
          else
            ARCHIVE_OK=0
          fi
          if [ "$ARCHIVE_OK" -ne 1 ] || [ ! -d "build/App.xcarchive" ]; then
            echo "::error::Arsiv olusturulamadi."
            echo "============ 'error' GECEN SATIRLAR (ONCELIKLI OKU) ============"
            grep -i "error" /tmp/archive.log || echo "(error kelimesi gecen satir bulunamadi, tam logu asagida oku)"
            echo "============ TAM XCODEBUILD LOG CIKTISI ============"
            cat /tmp/archive.log
            echo "============================================================"
            exit 1
          fi
          echo "Arsivleme tamamlandi."

      - name: "[İmzalı mod] exportOptions.plist olustur"
        if: steps.signing-check.outputs.has_signing == 'true'
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_PROFILE_NAME: ${{ secrets.IOS_PROFILE_NAME }}
          BUNDLE_ID: ${{ steps.params.outputs.bundle_id }}
        run: python3 scripts/generate-export-options.py

      - name: "[İmzalı mod] .ipa olarak dısa aktar (xcodebuild -exportArchive)"
        if: steps.signing-check.outputs.has_signing == 'true'
        run: |
          set -o pipefail
          if xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist exportOptions.plist 2>&1 | tee /tmp/export.log | xcpretty; then
            EXPORT_OK=1
          else
            EXPORT_OK=0
          fi
          if [ "$EXPORT_OK" -ne 1 ] || ! ls build/ipa/*.ipa >/dev/null 2>&1; then
            echo "::error::IPA olusturulamadi."
            echo "============ 'error' GECEN SATIRLAR (ONCELIKLI OKU) ============"
            grep -i "error" /tmp/export.log || echo "(error kelimesi gecen satir bulunamadi, tam logu asagida oku)"
            echo "============ TAM XCODEBUILD LOG CIKTISI ============"
            cat /tmp/export.log
            echo "============================================================"
            exit 1
          fi
          echo "### ✅ App Store'a Hazir IPA Uretildi" >> "$GITHUB_STEP_SUMMARY"
          echo "- Bundle ID: \`${{ steps.params.outputs.bundle_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Versiyon: \`${{ steps.params.outputs.version }}\` (Build \`${{ steps.params.outputs.build_number }}\`)" >> "$GITHUB_STEP_SUMMARY"

      - name: IPA'yi is akisi ciktisi olarak yukle
        if: steps.signing-check.outputs.has_signing == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: hemsire-rehberi-pro-ipa
          path: build/ipa/*.ipa
          if-no-files-found: error
          retention-days: 90

      - name: Dosyalari GitHub Release'e ekle (yalnizca release olayinda)
        if: steps.signing-check.outputs.has_signing == 'true' && github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/ipa/*.ipa
