name: iOS IPA Derle

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      bundle_id:
        description: 'Bundle Identifier (bos birakilirsa capacitor.config.json degeri kullanilir)'
        required: false
        default: ''
      marketing_version:
        description: 'Versiyon numarasi (orn. 1.0.0)'
        required: false
        default: '1.0.0'
      build_number:
        description: 'Build numarasi (orn. 1)'
        required: false
        default: ''
  release:
    types: [ created ]

permissions:
  contents: write

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14

    steps:
      - name: Kodu al (checkout)
        uses: actions/checkout@v4

      - name: Xcode surumunu sec
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: NPM bagimliliklarini kur
        run: npm install

      - name: Eski ios klasorunu temizle
        run: |
          if [ -d "ios" ]; then
            echo "Eski ios/ klasoru bulundu, siliniyor..."
            rm -rf ios
          else
            echo "ios/ klasoru yok, temiz baslangic."
          fi

      - name: Capacitor iOS platformunu ekle
        run: npx cap add ios

      - name: Uygulama ikonu ve splash screen gorsellerini uret
        run: npx capacitor-assets generate --ios

      - name: Reklam kimliklerini (AdMob) projeye isle
        run: python3 scripts/patch-ads.py

      - name: Podfile'i yamala
        run: python3 scripts/patch-podfile.py

      - name: CocoaPods bagimliliklarini da iceren senkronizasyon
        run: npx cap sync ios

      - name: iOS projesini duzenle
        run: python3 scripts/patch-ios.py

      - name: Kaynak dosyalarini Xcode projesine kaydet
        run: |
          gem install xcodeproj --no-document
          ruby scripts/add_resource_to_xcodeproj.rb PrivacyInfo.xcprivacy
          if [ -f "ios/App/App/GoogleService-Info.plist" ]; then
            ruby scripts/add_resource_to_xcodeproj.rb GoogleService-Info.plist
          else
            echo "UYARI: GoogleService-Info.plist bulunamadi."
          fi

      - name: Derleme parametrelerini belirle
        id: params
        run: |
          BUNDLE_ID="${{ github.event.inputs.bundle_id }}"
          if [ -z "$BUNDLE_ID" ]; then
            BUNDLE_ID=$(node -p "require('./capacitor.config.json').appId")
          fi
          VERSION="${{ github.event.inputs.marketing_version }}"
          if [ -z "$VERSION" ]; then VERSION="1.0.0"; fi
          BUILD_NUM="${{ github.event.inputs.build_number }}"
          if [ -z "$BUILD_NUM" ]; then BUILD_NUM="${{ github.run_number }}"; fi
          echo "bundle_id=$BUNDLE_ID" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUM" >> "$GITHUB_OUTPUT"
          echo "Bundle ID: $BUNDLE_ID / Version: $VERSION / Build: $BUILD_NUM"

      - name: Imzalama sirlari mevcut mu kontrol et
        id: signing-check
        run: |
          if [ -n "${{ secrets.IOS_DIST_CERT_BASE64 }}" ] && [ -n "${{ secrets.IOS_DIST_CERT_PASSWORD }}" ] && [ -n "${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}" ] && [ -n "${{ secrets.IOS_TEAM_ID }}" ] && [ -n "${{ secrets.IOS_PROFILE_NAME }}" ]; then
            echo "has_signing=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "[Imzasiz mod] Simulator icin derle"
        if: steps.signing-check.outputs.has_signing == 'false'
        run: |
          xcodebuild -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            MARKETING_VERSION="${{ steps.params.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.params.outputs.build_number }}" \
            build | xcpretty || true
          echo "### ⚠️ İmzasız Mod (Duman Testi)" >> "$GITHUB_STEP_SUMMARY"
          echo "Apple imzalama sirlari (secrets) tanimlanmadigi icin gercek bir .ipa uretilmedi." >> "$GITHUB_STEP_SUMMARY"
          echo "Gerekli 5 secret: IOS_DIST_CERT_BASE64, IOS_DIST_CERT_PASSWORD, IOS_PROVISION_PROFILE_BASE64, IOS_TEAM_ID, IOS_PROFILE_NAME" >> "$GITHUB_STEP_SUMMARY"

      - name: "[İmzalı mod] Sertifika ve provisioning profile kur"
        if: steps.signing-check.outputs.has_signing == 'true'
        env:
          CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain

          echo "$CERT_BASE64" | base64 -d > certificate.p12
          security import certificate.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm -f certificate.p12

          echo "$PROFILE_BASE64" | base64 -d > profile.mobileprovision
          echo "==== KURULAN PROFILIN ADI ===="
          security cms -D -i profile.mobileprovision | grep -A1 "<key>Name</key>" || true
          echo "=============================="
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          mkdir -p ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/profile.mobileprovision

      - name: "[İmzalı mod] Ruby ve Fastlane kur"
        if: steps.signing-check.outputs.has_signing == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: "[İmzalı mod] Fastlane ile arsivle ve .ipa olarak disa aktar"
        if: steps.signing-check.outputs.has_signing == 'true'
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_PROFILE_NAME: ${{ secrets.IOS_PROFILE_NAME }}
          BUNDLE_ID: ${{ steps.params.outputs.bundle_id }}
        run: |
          set -o pipefail
          if bundle exec fastlane ios build_release 2>&1 | tee /tmp/fastlane.log; then
            BUILD_OK=1
          else
            BUILD_OK=0
          fi
          if [ "$BUILD_OK" -ne 1 ] || ! ls build/ipa/*.ipa >/dev/null 2>&1; then
            echo "::error::IPA olusturulamadi."
            echo "============ 'error' GECEN SATIRLAR ============"
            grep -i "error" /tmp/fastlane.log || echo "(error satiri yok)"
            exit 1
          fi
          echo "### ✅ App Store'a Hazir IPA Uretildi" >> "$GITHUB_STEP_SUMMARY"
          echo "- Bundle ID: \`${{ steps.params.outputs.bundle_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Versiyon: \`${{ steps.params.outputs.version }}\` (Build \`${{ steps.params.outputs.build_number }}\`)" >> "$GITHUB_STEP_SUMMARY"

      - name: IPA'yi is akisi ciktisi olarak yukle
        if: steps.signing-check.outputs.has_signing == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: clinical-guide-pro-ipa
          path: build/ipa/*.ipa
          if-no-files-found: error
          retention-days: 90

      - name: Dosyalari GitHub Release'e ekle
        if: steps.signing-check.outputs.has_signing == 'true' && github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build/ipa/*.ipa
