<style>

    --red:#D92D20; --red-bg:#FDECEA;
    --amber:#B25E00; --amber-bg:#FEF3E2;
    --green:#0E8A4B; --green-bg:#E7F8EF;
    --ink:#141B2B; --ink-2:#4A5468; --line:#E4E9F2;
    --surface:#FFFFFF; --bg:#F5F8FE;
  }
  [data-theme="dark"]{
    --blue-900:#9DC1FF; --blue-700:#6EA0FF; --blue-500:#3B7DFF; --blue-100:#152A52;
    --red:#FF8A80; --red-bg:#3A1717;
    --amber:#FFC069; --amber-bg:#3A2C10;
    --green:#7BE5B0; --green-bg:#0F2E20;
    --ink:#EAF0FB; --ink-2:#AAB6CC; --line:#26324A;

  body{margin:0;font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;}
  h1,h2,h3,.brand,.nav-label{font-family:'Manrope',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  #app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:76px;background:var(--bg);}

  /* Top bar */
  .topbar{position:sticky;top:0;z-index:30;background:var(--surface);border-bottom:1px solid var(--line);padding:10px 14px 10px;}
  .topbar-row{display:flex;align-items:center;gap:10px;}
  .brand{font-weight:800;font-size:15px;color:var(--blue-900);flex:1;display:flex;align-items:center;gap:8px;}
  .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--blue-500);}
  .icon-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:var(--surface);color:var(--ink);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;}
  .searchwrap{margin-top:8px;position:relative;}
  .searchbox{width:100%;padding:11px 14px 11px 38px;border-radius:12px;border:1.5px solid var(--line);background:var(--bg);font-size:14px;color:var(--ink);outline:none;}
  .searchbox:focus{border-color:var(--blue-500);}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.5;font-size:14px;}
  .search-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surface);border:1px solid var(--line);border-radius:14px;max-height:60vh;overflow-y:auto;box-shadow:0 12px 30px rgba(10,20,40,.18);z-index:40;}
  .search-item{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:flex-start;cursor:pointer;}
  .search-item:last-child{border-bottom:none;}
  .search-item:hover{background:var(--bg);}
  .search-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px;white-space:nowrap;margin-top:2px;}
  .search-title{font-size:13.5px;font-weight:600;}
  .search-sub{font-size:11.5px;color:var(--ink-2);margin-top:1px;}
  .search-empty{padding:16px;text-align:center;color:var(--ink-2);font-size:13px;}

  .content{padding:14px 14px 20px;}
  .disclaimer{background:var(--amber-bg);border:1px solid var(--amber);color:var(--amber);border-radius:12px;padding:10px 12px;font-size:11.5px;line-height:1.5;margin-bottom:14px;font-weight:500;}

  .section-title{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-2);font-weight:700;margin:18px 0 8px;}
  .section-title:first-child{margin-top:0;}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .clinic-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px;cursor:pointer;position:relative;transition:transform .12s ease;}
  .clinic-card:active{transform:scale(.97);}
  .clinic-card .em{font-size:22px;}
  .clinic-card .t{font-weight:700;font-size:13px;margin-top:6px;line-height:1.25;}
  .clinic-card .badge{position:absolute;top:10px;right:10px;font-size:9px;background:var(--blue-100);color:var(--blue-700);padding:2px 6px;border-radius:6px;font-weight:700;}
  .clinic-card.locked{opacity:.55;}
  .clinic-card.locked .t{color:var(--ink-2);}

  .card{background:var(--surface);border:1px solid var(--line);border-left:4px solid var(--blue-500);border-radius:12px;padding:12px 13px;margin-bottom:10px;}
  .card.red{border-left-color:var(--red);}
  .card.amber{border-left-color:var(--amber);}
  .card.green{border-left-color:var(--green);}
  .card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;cursor:pointer;}
  .card-title{font-weight:700;font-size:14px;}
  .card-sub{font-size:11.5px;color:var(--ink-2);margin-top:2px;}
  .fav-btn{background:none;border:none;font-size:17px;cursor:pointer;color:var(--ink-2);line-height:1;padding:2px;}
  .fav-btn.active{color:var(--red);}

  .tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;}
  .tag.risk{background:var(--red-bg);color:var(--red);}
  .tag.lasa{background:var(--amber-bg);color:var(--amber);}

  .backbar .icon-btn{width:32px;height:32px;}
  .backbar h1{font-size:16px;margin:0;font-weight:800;}

  .subnav{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:6px;}
  .subnav::-webkit-scrollbar{display:none;}

  .list-row .val{font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:var(--blue-700);font-weight:600;}

  .cal-day.shift-0817{background:var(--green-bg);color:var(--green);}
  .cal-day.shift-1608{background:var(--amber-bg);color:var(--amber);}
  .cal-day.shift-0808{background:var(--red-bg);color:var(--red);}

  .shift-btn.shift-0808{background:var(--red-bg);color:var(--red);border-color:transparent;}

  .notif-banner{background:var(--red-bg);border:1px solid var(--red);color:var(--red);border-radius:12px;padding:10px 12px;font-size:12.5px;line-height:1.5;margin-bottom:12px;font-weight:600;}
</style>

<!-- ============================================================
     ERKEN MOBİL POLYFILL (ana uygulama scriptinden ÖNCE çalışmalı)
     -----------------------------------------------------------
     Ana uygulama, açılışta senkron olarak loadPersisted() çağırıp
     window.storage'ı okumaya çalışıyor. window.storage polyfill'i
     ana scriptten SONRA gelen bir script bloğunda olsaydı, bu ilk
     okuma her zaman "veri yok" görür ve nöbetler/notlar/favoriler
     her açılışta sıfırlanmış gibi görünürdü. Bu yüzden polyfill
     burada, ana uygulama scriptinden ÖNCE tanımlanır. -->
<script>
(function(){
  'use strict';
  if (typeof window.storage === 'undefined') {
    window.storage = {
      get: function(key){
        return new Promise(function(resolve, reject){
          try {
            var v = window.localStorage.getItem(key);
            if (v === null) { resolve(null); return; }
            resolve({ key: key, value: v, shared: false });
          } catch(e){ reject(e); }
        });
      },
      set: function(key, value){
        return new Promise(function(resolve, reject){
          try {
            window.localStorage.setItem(key, value);
            resolve({ key: key, value: value, shared: false });
          } catch(e){ reject(e); }
        });
      },
      delete: function(key){
        return new Promise(function(resolve, reject){
          try {
            window.localStorage.removeItem(key);
            resolve({ key: key, deleted: true, shared: false });
          } catch(e){ reject(e); }
        });
      },
      list: function(prefix){
        return new Promise(function(resolve, reject){
          try {
            var keys = [];
            for (var i=0; i<window.localStorage.length; i++){
              var k = window.localStorage.key(i);
              if (!prefix || (k && k.indexOf(prefix) === 0)) keys.push(k);
            }
            resolve({ keys: keys, prefix: prefix, shared: false });
          } catch(e){ reject(e); }
        });
      }
    };
  }
})();
</script>

  diseases:[
    {title:'Respiratuar Distres Sendromu (RDS)', color:'red', def:'Prematüre akciğerlerde sürfaktan eksikliğine bağlı solunum güçlüğü sendromu.',
     symptoms:'Takipne, inleme (grunting), burun kanadı solunumu, interkostal/subkostal çekilmeler, siyanoz.',
     dx:'Akciğer grafisi (buzlu cam görünümü), kan gazı, SpO2.',
     tx:'Sürfaktan replasman tedavisi, CPAP/mekanik ventilasyon desteği, oksijen titrasyonu.',

     complications:'Pnömotoraks, bronkopulmoner displazi, intraventriküler kanama.'},
    {title:'Hiperbilirubinemi (Yenidoğan Sarılığı)', color:'amber', def:'Serum bilirubin düzeyinin fizyolojik/patolojik nedenlerle yükselmesi.',

  protocols:[{title:'Ludwig Anjini Acil Havayolu Değerlendirme Kontrol Listesi', items:['Havayolu açıklığı sürekli izlendi mi','Entübasyon/trakeostomi ekibi bilgilendirildi mi','IV geniş spektrumlu antibiyotik başlandı mı','Acil cerrahi drenaj planlandı mı']},
    {title:'Diş Apsesi Drenaj Sonrası İzlem Kontrol Listesi', items:['Şişlik yayılımı değerlendirildi mi','Ateş takip edildi mi','Antibiyoterapiye uyum sağlandı mı','Oral alım toleransı değerlendirildi mi']}],
  nanda:[{dx:'Etkisiz Havayolu Temizliği Riski', related:'Ağız tabanı/boyun enfeksiyonuna bağlı şişlik ile ilişkili', outcome:'Hasta açık havayolu bulgusu gösterir.'},
    {dx:'Beslenmede Yetersizlik Riski', related:'Ağız içi ağrı ve çiğneme güçlüğü ile ilişkili', outcome:'Hasta yeterli kalori/sıvı alımını sürdürür.'}]

acil_112: {
  name:'Acil Sağlık Hizmetleri (Ambulans)',
  intro:{
    patients:'Sahada (ev, iş yeri, sokak, trafik kazası, afet alanı vb.) ani gelişen her türlü tıbbi acil, travma, obstetrik acil ve psikiyatrik kriz ile karşılaşılan her yaştan hasta değerlendirilir. Hastane Acil Servisi\'nden farkı: müdahale hastane dışında, sınırlı ekipman ve personelle, çoğunlukla kontrolsüz bir ortamda başlar.',
    common:['Kardiyak Arrest (Hastane Dışı)','Trafik Kazası/Politravma','Akut Koroner Sendrom (Prehospital STEMI)','Akut İnme (Prehospital)','Solunum Sıkıntısı (KOAH/Astım Alevlenmesi)'],
    role:'Paramedik/ATT; sahne güvenliğini sağlamak, hızlı birincil değerlendirme (ABCDE) yapmak, hayat kurtarıcı girişimleri (CPR, havayolu, kanama kontrolü, IV/IO yol) uygulamak, doğru hastaneye/uygun triyaj kategorisine hızlı ve güvenli nakli sağlamak ve KKM (Komuta Kontrol Merkezi) ile koordinasyonu yürütmekten sorumludur.'
  },
  workflow:{
    morning:['Araç ve malzeme sayımı (defibrilatör, oksijen tüpü, ilaç çantası, sedye)','Cihazların (monitör, glukometre, kapnograf) fonksiyon testi','Vardiya devir teslimi ve bölge/istasyon bilgilendirmesi'],
    noon:['Vaka bildirimlerine (KKM üzerinden) yanıt','Sahne güvenliği değerlendirmesi ve olay yeri yönetimi','Hasta değerlendirme, stabilizasyon ve nakil kararları'],
    evening:['Malzeme/ilaç tüketiminin tamamlanması ve yeniden stoklama','Vaka kayıtlarının (e-nabız/112 kayıt sistemi) tamamlanması'],
    night:['Sürekli vaka hazırlığı ve dinlenme rotasyonu','Kritik vaka sonrası ekip değerlendirmesi (debriefing)','Araç/malzeme gece kontrolü'],
    handover:['Hastane Acil Servisi\'ne SBAR formatında: vaka özeti, sahada uygulanan girişimler, vital bulgu seyri, verilen ilaçlar ve dozları, tahmini olay zamanı bildirilir']
  },
  admission:{
    steps:['Sahne güvenliği değerlendirmesi (trafik, yangın, elektrik, şiddet riski, KBRN şüphesi)','Kişisel koruyucu ekipman (eldiven, gerekiyorsa gözlük/maske) giyilmesi','Hızlı birincil değerlendirme: ABCDE (havayolu-solunum-dolaşım-nörolojik durum-maruziyet)','Olay mekanizmasının belirlenmesi (travma mekanizması, semptom başlangıç zamanı)','Triyaj kategorisinin belirlenmesi ve nakil önceliğinin (acil/normal) kararlaştırılması','KKM\'ye durum bildirimi ve hedef hastane/branş konsültasyonu (STEMI/inme alarmı gerekiyorsa)']
  },
  diseases:[
    {title:'Hastane Dışı Kardiyak Arrest', color:'red', def:'Hastane dışında, sahada gelişen ani kalp durması; nabız ve solunumun olmaması ile karakterizedir.',
     symptoms:'Yanıtsızlık, nabız yokluğu, apne veya agonal solunum.',
     dx:'Klinik değerlendirme (nabız/solunum kontrolü ≤10 saniye), monitörde ritim analizi (VF/nabızsız VT, asistoli, NEA).',
     tx:'Derhal yüksek kaliteli göğüs kompresyonu (kesintisiz, 100-120/dk), erken defibrilasyon (şoklanabilir ritimde), havayolu yönetimi, IV/IO yol ve ACLS ilaç protokolü (adrenalin, gerekirse amiodaron).',
     nursing:'Kompresyon kalitesinin (derinlik, hız, göğsün tam geri gelmesi) sürekli izlenmesi, kompresyoncunun 2 dakikada bir rotasyonu, kapnografi ile ETCO2 takibi (kompresyon kalitesi ve ROSC göstergesi), aile/yakınlara bilgilendirme ve destek.',
     followup:'ROSC (spontan dolaşımın geri dönmesi) sağlanırsa post-arrest bakım (hedefe yönelik sıcaklık yönetimi, 12-derivasyon EKG) için uygun merkeze nakil.',
     complications:'Kalıcı hipoksik beyin hasarı, resüsitasyona rağmen ölüm, kaburga/sternum kırığı (kompresyona bağlı).'},
    {title:'Prehospital STEMI (ST Elevasyonlu MI)', color:'red', def:'Sahada, 12-derivasyon EKG ile tespit edilen, koroner arterin akut tam tıkanmasına bağlı miyokard infarktüsü.',
     symptoms:'Göğüs ağrısı/baskı (sıklıkla sol kola/çeneye yayılan), terleme, bulantı, nefes darlığı; yaşlı/diyabetik hastada atipik (sessiz) seyredebilir.',
     dx:'Sahada 12-derivasyon EKG çekimi ve yorumlanması, ağrı/semptom öyküsü.',
     tx:'Oksijen (hipoksemi varsa), aspirin (çiğnetilerek), nitrogliserin (hipotansiyon yoksa), ağrı için morfin; EKG bulgusu STEMI ile uyumluysa KKM/hastaneye "STEMI alarmı" bildirimi ile doğrudan kateter laboratuvarına yönlendirme.',
     nursing:'IV yol açılması, sürekli monitörizasyon (aritmi riski), tekrar EKG çekimi, hastaneye erken haber verilerek kapı-balon süresinin kısaltılması, hastanın sakinleştirilmesi.',
     followup:'Doğrudan kateter laboratuvarına veya belirlenmiş STEMI merkezine nakil; ambulans içi EKG hastane ekibine önceden iletilir.',
     complications:'Kardiyojenik şok, ölümcül aritmi (VF/VT), kardiyak arrest.'},
    {title:'Prehospital Akut İnme', color:'red', def:'Sahada FAST (yüz-kol-konuşma-zaman) bulgularıyla tanınan, ani nörolojik defisitle giden serebrovasküler olay.',
     symptoms:'Ani yüz asimetrisi, tek taraflı kol/bacak güçsüzlüğü, konuşma bozukluğu, denge kaybı, şiddetli baş ağrısı.',
     dx:'FAST/Cincinnati Prehastane İnme Skalası, kan şekeri ölçümü (hipoglisemi inme taklidi yapabilir), kesin semptom başlangıç zamanının (veya "son normal görülme zamanı") belirlenmesi.',
     tx:'Havayolu/solunum desteği, oksijen (hipoksemi varsa), kan şekeri düzeltmesi (hipoglisemi ise), hastaneye "inme alarmı" bildirimi ile belirlenmiş inme merkezine hızlı nakil.',
     nursing:'Semptom başlangıç zamanının netleştirilmesi (trombolitik/trombektomi penceresi için kritik bilgi), oral alımın kısıtlanması (aspirasyon riski), sık nörolojik değerlendirme, hastanın sakinleştirilmesi.',
     followup:'İnme merkezine doğrudan/öncelikli nakil; sahada alınan bilgiler (zaman, ilk bulgular) hastane ekibine SBAR ile aktarılır.',
     complications:'Hızlı nörolojik kötüleşme, havayolu koruma kaybı, aspirasyon.'},
    {title:'Politravma / Trafik Kazası', color:'red', def:'Trafik kazası, yüksekten düşme veya künt/penetran travma sonucu birden fazla vücut bölgesini etkileyen, yaşamı tehdit edebilen yaralanma tablosu.',
     symptoms:'Değişken; görünür deformite/kanama, hipotansiyon, bilinç değişikliği, solunum sıkıntısı, ağrı.',
     dx:'Sahada ABCDE birincil değerlendirmesi, olay mekanizmasının değerlendirilmesi (yüksek enerjili travma şüphesi), hızlı travma taraması.',
     tx:'Kanama kontrolü (direkt bası, gerekirse turnike), havayolu yönetimi, servikal immobilizasyon (şüphe varsa), IV/IO yol ve sıvı resüsitasyonu, ağrı yönetimi, hızlı ve güvenli nakil ("scoop and run" prensibi ağır travmada).',
     nursing:'Servikal collar ve sedye immobilizasyonunun doğru uygulanması, sık vital bulgu takibi, hipotermi önleme (battaniye/örtü), kanama bölgelerinin sürekli gözlenmesi, ağrı skorlaması.',
     followup:'Travma merkezine (mekanizma/yaralanma ciddiyetine göre) doğrudan nakil; sahada tespit edilen tüm bulgular hastane ekibine detaylı aktarılır.',
     complications:'Hemorajik şok, gerilim pnömotoraks, hipotermi-asidoz-koagülopati triadı.'},
    {title:'Turnike Gerektiren Ekstremite Kanaması', color:'red', def:'Direkt bası ile kontrol edilemeyen, ekstremiteden kaynaklanan ciddi/yaşamı tehdit eden kanama.',
     symptoms:'Aktif, pulsatil veya yoğun sızıntı tarzında kanama; hipovolemik şok bulguları (taşikardi, hipotansiyon, soluk-nemli cilt).',
     dx:'Görsel değerlendirme; direkt basıya yanıtsızlık.',
     tx:'Turnikenin kanama bölgesinin 5-7 cm proksimaline, sıkıca ve kanama tam duruncaya kadar uygulanması; uygulama saatinin kaydedilmesi.',
     nursing:'Turnike uygulama zamanının mutlaka not edilmesi/hastaya yazılması, distal nabzın kanama durduktan sonra kontrolü, ağrı yönetimi, hastanın hipovolemik şok açısından izlenmesi.',
     followup:'Turnike, hastane ekibi tarafından kontrollü şekilde gevşetilene kadar sahada açılmaz; hastaneye "turnike uygulandı, saat: ..." bilgisiyle teslim edilir.',
     complications:'Uzamış turnike süresine bağlı ekstremite iskemisi (bu risk, kanama kontrolsüz kalırsa oluşacak ölüm riskinden daha küçüktür).'},
    {title:'Akut Solunum Sıkıntısı (KOAH/Astım Alevlenmesi)', color:'red', def:'Bronkospazm ve/veya artmış sekresyona bağlı, sahada tespit edilen akut solunum yetmezliği tablosu.',
     symptoms:'Hırıltılı solunum (wheezing), yardımcı solunum kası kullanımı, konuşamayacak kadar nefes darlığı, siyanoz, SpO2 düşüklüğü.',
     dx:'Klinik değerlendirme, SpO2 ölçümü, akciğer oskültasyonu, öykü (bilinen KOAH/astım).',
     tx:'Oksijen desteği, nebül bronkodilatör (salbutamol ± ipratropium), ağır vakada CPAP (varsa) veya havayolu desteği; hastaneye erken bildirim.',
     nursing:'SpO2 ve solunum sayısının sürekli izlenmesi, hastanın oturur pozisyonda taşınması, sakinleştirme (anksiyete solunum sıkıntısını artırır), kötüleşme durumunda havayolu müdahalesine hazırlıklı olma.',
     followup:'Solunum sıkıntısı acil servisine detaylı SBAR ile (uygulanan nebül, yanıt) teslim edilir.',
     complications:'Solunum yorgunluğu, respiratuar arrest, pnömotoraks (ağır vakalarda).'},
    {title:'Anafilaksi (Saha)', color:'red', def:'Sahada ani başlayan, çoklu sistemi etkileyen, potansiyel olarak yaşamı tehdit eden ağır alerjik reaksiyon.',
     symptoms:'Ürtiker, dudak/dil/boğaz ödemi, hırıltılı solunum, hipotansiyon, bilinç değişikliği.',
     dx:'Klinik tanı (temas öyküsü + ani başlayan çoklu sistem bulgusu).',
     tx:'Derhal IM adrenalin (uyluk anterolateral, oto-enjektör veya ampul), oksijen, IV sıvı desteği; gerekirse tekrar adrenalin dozu (5-15 dakikada bir).',
     nursing:'Havayolu açıklığının sürekli değerlendirilmesi, adrenalin uygulamasının GECİKMEDEN yapılması (saha ölümlerinin başlıca nedeni gecikmiş adrenalin), hastanın düz/yarı oturur pozisyonda (duruma göre) taşınması.',
     followup:'Bifazik reaksiyon riski nedeniyle hastane gözlemine mutlaka nakil; sahada verilen adrenalin dozu/saati hastaneye bildirilir.',
     complications:'Havayolu obstrüksiyonu, kardiyovasküler kollaps, bifazik anafilaksi.'},
    {title:'Hipoglisemi (Saha)', color:'amber', def:'Sahada bilinç değişikliği ile başvuran, düşük kan şekeri ile ilişkili acil durum; inme taklidi yapabilir.',
     symptoms:'Terleme, tremor, konfüzyon, ajitasyon, bilinç kaybı, nöbet (ağır vakada).',
     dx:'Hızlı glukometre ile kan şekeri ölçümü — bilinç değişikliği olan HER hastada ilk yapılması gereken değerlendirmelerden biridir.',
     tx:'Bilinci açık hastada oral hızlı şeker; bilinci kapalı/yutma güçlüğü olan hastada IV %10-30 dekstroz veya IM/intranazal glukagon.',
     nursing:'Kan şekeri düzeltmesi sonrası tekrar ölçüm, bilinç düzeyi takibi, altta yatan neden (insülin dozu, oral antidiyabetik, alkol) sorgulanması, aspirasyon riskine karşı oral alım öncesi bilinç kontrolü.',
     followup:'Sülfonilüre kaynaklı hipoglisemi tekrarlayabileceğinden, bu hastalarda hastane değerlendirmesi/gözlemi önerilir.',
     complications:'Nöbet, aspirasyon, uzamış hipoglisemiye bağlı kalıcı nörolojik hasar.'},
    {title:'Status Epileptikus (Saha)', color:'red', def:'Sahada 5 dakikadan uzun süren veya ardışık, aralarında bilincin tam açılmadığı nöbetler.',
     symptoms:'Devam eden tonik-klonik kasılma, bilinç kapalılığı, siyanoz (uzamışsa).',
     dx:'Klinik gözlem (nöbet süresi ve tipi), kan şekeri ölçümü (hipoglisemi dışlanması).',
     tx:'Havayolu koruması (nöbet sırasında zorla müdahale edilmez), oksijen, IV/intranazal/bukkal benzodiazepin (midazolam) uygulaması.',
     nursing:'Hastanın çevresel yaralanmadan korunması, ağza herhangi bir cisim sokulmaması, nöbet süresinin kaydedilmesi, nöbet sonrası (postiktal) bilinç durumunun izlenmesi.',
     followup:'Nöbeti durmayan veya nedeni bilinmeyen hastada nöroloji değerlendirmesi için nakil.',
     complications:'Uzamış hipoksi, aspirasyon, kalıcı nörolojik hasar (tedavi edilmeyen status epileptikusta).'},
    {title:'Opioid Aşırı Dozu (Saha)', color:'red', def:'Sahada opioid alımına bağlı solunum depresyonu ve bilinç kapalılığı ile giden acil durum.',
     symptoms:'Miyozis (iğne ucu pupil), solunum depresyonu/apne, bilinç kapalılığı, siyanoz.',
     dx:'Klinik tablo, sahada bulunan ilaç/enjektör kanıtı, tanıklık.',
     tx:'Havayolu ve solunum desteği (balon-maske ventilasyon), IM/intranazal/IV nalokson uygulaması, gerekirse tekrar doz.',
     nursing:'Solunum sayısı ve SpO2 sürekli takibi, nalokson sonrası ani ajitasyon/yoksunluk bulgularına hazırlıklı olma, nalokson etkisi geçtiğinde tekrar solunum depresyonu riski nedeniyle nakil sırasında yakın izlem.',
     followup:'Nalokson etkisi opioidden kısa sürebileceğinden hastanın nakil sırasında ve hastanede birkaç saat gözlemi gerekir.',
     complications:'Solunum arresti, aspirasyon, hipoksik beyin hasarı, nalokson sonrası ajitasyon/saldırganlık.'},
    {title:'Prehospital Doğum (Saha Doğumu)', color:'amber', def:'Hastaneye ulaşım öncesinde sahada veya ambulansta gerçekleşen, beklenmeyen doğum eylemi.',
     symptoms:'Düzenli ve sıklaşan kasılmalar, doğum kanalında baş/bebek görünmesi, anne bildirimi ("doğum yaklaşıyor").',
     dx:'Klinik gözlem (perine muayenesi ile doğumun yakınlığının değerlendirilmesi).',
     tx:'Doğum kaçınılmazsa steril doğum setiyle sahada doğuma yardımcı olunur; bebek doğar doğmaz kurulanır, ısıtılır, gerekiyorsa uyarılır; anne ve bebek stabilize edilip birlikte hastaneye nakledilir.',
     nursing:'Mahremiyetin sağlanması, anne ve bebeğin hipotermiden korunması, doğum sonrası anne kanamasının (uterus atonisi) yakın izlenmesi, plasenta çıkarsa saklanıp hastaneye götürülmesi.',
     followup:'Anne ve yenidoğan birlikte, doğum saati ve olay detaylarıyla kadın doğum/yenidoğan ekibine teslim edilir.',
     complications:'Postpartum hemoraji, yenidoğan hipotermisi/asfiksisi, omuz distosisi.'},
    {title:'Ajite/Agresif Hasta (Psikiyatrik Kriz, Saha)', color:'amber', def:'Sahada kendine veya çevresine zarar verme riski taşıyan, ajite veya agresif davranış sergileyen hasta.',
     symptoms:'Ajitasyon, saldırganlık, gerçeklikle bağının kopması, öz kıyım/başkasına zarar verme ifadeleri.',
     dx:'Klinik gözlem; organik neden (hipoglisemi, hipoksi, madde etkisi) mutlaka dışlanmaya çalışılır.',
     tx:'Öncelik ekip ve hasta güvenliği; sözel sakinleştirme (de-eskalasyon) teknikleri, gerekirse güvenlik/polis desteği, aşırı ajitasyonda hekim onayıyla sedasyon.',
     nursing:'Kendini ve ekibi güvenli mesafede tutma, tehdit edici olmayan beden dili, hastayı yargılamadan dinleme, fiziksel tespit (varsa) yalnızca son çare ve protokole uygun şekilde uygulanır.',
     followup:'Psikiyatri acil değerlendirmesi için uygun merkeze nakil; sahada gözlenen davranışlar ve olası tetikleyiciler hastane ekibine aktarılır.',
     complications:'Ekip/hasta yaralanması, hastanın kaçması, yetersiz de-eskalasyona bağlı durumun kötüleşmesi.'},
    {title:'Termal Yanık', color:'red', def:'Isı kaynağına (ateş, sıcak sıvı, buhar, temas) bağlı deri ve/veya alttaki dokuların hasarı; derinlik (1./2./3. derece) ve yüzey alanına göre sınıflandırılır.',
     symptoms:'1. derece: kızarıklık, ağrı. 2. derece: bül, şiddetli ağrı, nemli görünüm. 3. derece: beyaz/kömürleşmiş, ağrısız (sinir uçları hasarlı) deri.',
     dx:'Görsel değerlendirme; yanık derinliği ve "dokuz kuralı" (Rule of Nines) ile vücut yüzey alanı yüzdesi tahmini.',
     tx:'Yanık kaynağından uzaklaştırma, yanan bölgenin 10-20 dakika serin (soğuk değil, buzlu değil) suyla soğutulması, steril/temiz örtüyle kapatma, geniş yanıklarda IV sıvı resüsitasyonu ve ağrı yönetimi.',
     nursing:'Buz/dondurucu soğuk KULLANILMAZ (ek doku hasarı yapar), yapışkan madde/krem uygulanmaz, hipotermi riski nedeniyle geniş yanıklarda soğutma süresi sınırlı tutulur, havayolu yanığı şüphesinde (yüz/kaş kılları yanığı, is renkli balgam) erken havayolu değerlendirmesi kritik.',
     followup:'>%20 vücut yüzey alanı, yüz/el/genital bölge veya havayolu tutulumu şüphesi olan yanıklar yanık merkezine nakledilir.',
     complications:'Hipovolemik şok (geniş yanıkta sıvı kaybı), havayolu ödemi/obstrüksiyonu, hipotermi, enfeksiyon.'},
    {title:'Bıçaklanma / Penetran Yaralanma', color:'red', def:'Kesici-delici alet ile oluşan, iç organ/damar yaralanması riski taşıyan penetran travma.',
     symptoms:'Görünür yara, aktif kanama, yaralanma bölgesine göre değişen bulgular (göğüste solunum sıkıntısı, karında peritoneal bulgular).',
     dx:'Görsel değerlendirme, ABCDE birincil değerlendirme, yaralanma mekanizması ve alet özellikleri (boy, tahmini derinlik) sorgulanması.',
     tx:'Direkt bası ile kanama kontrolü, saplı cismin SAHADA ÇIKARILMAMASI (tampon etkisi kanamayı sınırlayabilir), etrafının sabitlenerek nakil, şok bulgusu varsa IV sıvı ve hızlı nakil.',
     nursing:'Batan cismi asla çıkarma/oynatma, cismin etrafını sabitleyip sarma, kanama miktarının ve hastanın bilinç/vital seyrinin sık izlenmesi, göğüs yaralanmasında solunum sesleri ve SpO2 yakın takibi.',
     followup:'Tüm penetran gövde yaralanmaları travma merkezine nakledilir; alet çıkarma işlemi yalnızca ameliyathanede kontrollü yapılır.',
     complications:'Hemorajik şok, pnömotoraks/hemotoraks (göğüs yaralanmasında), organ perforasyonu (karın yaralanmasında).'},
    {title:'Suda Boğulma (Near-Drowning)', color:'red', def:'Sıvıya batma sonucu solunum yolunun sıvıyla dolması/spazmına bağlı gelişen solunum yetmezliği; ölümcül olabilir veya kurtarılabilir (near-drowning).',
     symptoms:'Öksürük, solunum sıkıntısı, siyanoz, bilinç değişikliği veya kardiyak arrest (ağır vakada).',
     dx:'Olay öyküsü, klinik değerlendirme, SpO2 ölçümü, akciğer oskültasyonu (ral/wheezing).',
     tx:'Sudan çıkarma (kurtarıcı güvenliği önce sağlanır), gerekiyorsa CPR (standart oran, suda kompresyon uygulanmaz), oksijen desteği, ağır solunum yetmezliğinde havayolu yönetimi; TÜM boğulma vakaları asemptomatik olsa da hastane gözlemine nakledilir (gecikmiş pulmoner ödem riski).',

function calculateShiftDurationHours(shift){
  if(!shift || !shift.start || !shift.end) return 0;
  const [sh,sm] = shift.start.split(':').map(Number);
  const [eh,em] = shift.end.split(':').map(Number);
  let startMin = sh*60+sm, endMin = eh*60+em;
  let diff = endMin - startMin;
  if(diff <= 0) diff += 24*60; // gece yarısını geçen vardiya (örn. 16:00-08:00)
  return diff/60;
}
function getMonthTotalShiftHours(y, m){
  let total = 0;
  Object.keys(state.shifts).forEach(dateStr=>{
    const [dy,dm] = dateStr.split('-').map(Number);
    if(dy===y && dm===(m+1)){
      const shift = normalizeShift(state.shifts[dateStr]);
      total += calculateShiftDurationHours(shift);
    }
  });
  return total;
}

function requestShiftNotifPermission(){
  if(typeof Notification === 'undefined'){ alert('Bu tarayıcı bildirimleri desteklemiyor.'); return; }
  Notification.requestPermission().then(perm=>{ render(); });
}
function getUpcomingShifts(){
  const now = new Date();
  const upcoming = [];
  Object.keys(state.shifts).forEach(dateStr=>{
    const shift = normalizeShift(state.shifts[dateStr]);
    if(!shift || !shift.start) return;
    const start = new Date(dateStr+'T'+shift.start+':00');
    const diffH = (start - now) / 3600000;
    if(diffH > 0 && diffH <= 12){
      upcoming.push({dateStr, label: shift.label, hoursLeft: diffH});
    }
  });
  return upcoming.sort((a,b)=>a.hoursLeft-b.hoursLeft);
}
function checkUpcomingShifts(){
  const upcoming = getUpcomingShifts();
  let changed = false;
  upcoming.forEach(u=>{
    if(!state.notifiedShifts[u.dateStr]){
      if(typeof Notification !== 'undefined' && Notification.permission === 'granted'){
        try{ new Notification('Yaklaşan Nöbet', {body: `${formatDateLabelTR(u.dateStr)} - ${u.label} vardiyanız ${Math.round(u.hoursLeft)} saat sonra başlıyor.`}); }catch(e){}
      }
      state.notifiedShifts[u.dateStr] = true;
      changed = true;
    }
  });
  if(changed) saveNotifiedShifts();
  if(state.view==='home' || state.view==='schedule') render();
}

function buildSearchIndex(){
  const idx = [];
  Object.entries(CLINIC_DATA).forEach(([cid, c])=>{
    c.diseases.forEach((d,i)=> idx.push({title:d.title, sub:c.name+' · Hastalık', cat:'Hastalık', color:d.color, go:()=>openClinic(cid,'hastaliklar',i), text: d.title+' '+d.def+' '+d.symptoms}));
    c.drugs.forEach((d,i)=> idx.push({title:d.title, sub:c.name+' · İlaç ('+d.brand+')', cat:'İlaç', color:d.color, go:()=>openClinic(cid,'ilaclar',i), text: d.title+' '+d.brand+' '+d.generic+' '+d.group}));
    c.labs.forEach((l)=> idx.push({title:l.name, sub:c.name+' · Tetkik', cat:'Tetkik', color:'blue', go:()=>openClinic(cid,'tetkikler',null), text:l.name}));
    (c.abbreviations||[]).forEach(a=> idx.push({title:a.a, sub:a.full, cat:'Kısaltma', color:'amber', go:()=>{state.view='abbrev'; render();}, text:a.a+' '+a.full}));
  });
  ABBREV_GLOBAL.forEach(a=> idx.push({title:a.a, sub:a.full, cat:'Kısaltma', color:'amber', go:()=>{state.view='abbrev'; render();}, text:a.a+' '+a.full}));
  FLUIDS_GLOBAL.forEach(f=> idx.push({title:f.name, sub:'IV Sıvı · '+f.indication.slice(0,40), cat:'IV Sıvı', color:'green', go:()=>{state.view='fluids'; render();}, text:f.name+' '+f.composition+' '+f.indication}));
  INFUSIONS_GLOBAL.forEach(f=> idx.push({title:f.name, sub:'Kritik İnfüzyon · '+f.doseRange, cat:'İnfüzyon', color:'red', go:()=>{state.view='fluids'; render();}, text:f.name+' '+f.standardPrep+' '+f.doseRange}));
  return idx;
}
let SEARCH_INDEX = [];

function runSearch(q){
  if(!q || q.trim().length<1) return [];
  const nq = norm(q);
  return SEARCH_INDEX.filter(it => norm(it.text).includes(nq)).slice(0,20);
}

}

let lastResults = [];
function onSearchInput(v){
  state.searchTerm = v;

  /* KRİTİK KLAVYE DÜZELTMESİ: render() çağırmak yerine, YALNIZCA sonuç
     dropdown'ını doğrudan DOM üzerinde güncelliyoruz. Bu sayede <input>
     elemanı yazma sırasında HİÇBİR ZAMAN yok edilip yeniden oluşturulmuyor,
     dolayısıyla native klavye kesinlikle kapanmıyor/titremiyor. */
  const wrap = document.getElementById('searchwrap-container');
  if(wrap){
    const existing = document.getElementById('live-search-results');
    const newHTML = renderHomeSearchResultsHTML();
    if(!v){
      if(existing) existing.remove();

      existing.outerHTML = newHTML;
    } else {

  }
}

      <select id="gfr_sex" onchange="calcGFR()" style="padding:8px;border-radius:9px;border:1px solid var(--line);background:var(--bg);color:var(--ink);">
        <option value="f">Kadın</option><option value="m">Erkek</option>
      </select>
    </div>

    <div class="pdf-note">Yaklaşık değerdir; kesin klinik karar için laboratuvar/kılavuz hesaplayıcısı kullanılmalıdır.</div>

function calcBMI(){
  const w=parseFloat(document.getElementById('bmi_w').value), h=parseFloat(document.getElementById('bmi_h').value)/100;
  const el=document.getElementById('bmi_res');
  if(!w||!h){el.textContent='Sonuç için değerleri girin.';return;}
  const bmi=(w/(h*h));
  let cat = bmi<18.5?'Zayıf': bmi<25?'Normal': bmi<30?'Fazla Kilolu':'Obez';
  el.textContent = `BMI: ${bmi.toFixed(1)} kg/m² — ${cat}`;
}
function calcDrip(){
  const v=parseFloat(document.getElementById('dr_v').value), t=parseFloat(document.getElementById('dr_t').value), f=parseFloat(document.getElementById('dr_f').value);
  const el=document.getElementById('dr_res');
  if(!v||!t||!f){el.textContent='Sonuç için değerleri girin.';return;}
  const gtt = (v*f)/(t*60);
  el.textContent = `${gtt.toFixed(0)} damla/dakika (≈ ${(v/t).toFixed(1)} ml/saat)`;
}
function calcInfusion(){
  const w=parseFloat(document.getElementById('inf_w').value), d=parseFloat(document.getElementById('inf_d').value), c=parseFloat(document.getElementById('inf_c').value), vol=parseFloat(document.getElementById('inf_vol').value);
  const el=document.getElementById('inf_res');
  if(!w||!d||!c||!vol){el.textContent='Örn: Noradrenalin 4 mg / 50 ml SF için "Flakon: 4", "Hacim: 50" girin.';return;}
  const concMcgPerMl = (c*1000)/vol;
  const mlPerHour = (d*w*60)/concMcgPerMl;
  el.textContent = `${mlPerHour.toFixed(2)} ml/saat (konsantrasyon: ${concMcgPerMl.toFixed(1)} mcg/ml)`;
}
function calcGFR(){
  const cr=parseFloat(document.getElementById('gfr_cr').value), age=parseFloat(document.getElementById('gfr_age').value), sex=document.getElementById('gfr_sex').value;
  const el=document.getElementById('gfr_res');
  if(!cr||!age){el.textContent='Sonuç için değerleri girin.';return;}
  const k = sex==='f'?0.7:0.9; const a = sex==='f'?-0.241:-0.302;
  const minCr = Math.min(cr/k,1), maxCr = Math.max(cr/k,1);
  let gfr = 142 * Math.pow(minCr,a) * Math.pow(maxCr,-1.200) * Math.pow(0.9938, age);
  if(sex==='f') gfr *= 1.012;
  let stage = gfr>=90?'Evre 1 (Normal)': gfr>=60?'Evre 2 (Hafif azalmış)': gfr>=30?'Evre 3 (Orta azalmış)': gfr>=15?'Evre 4 (Ağır azalmış)':'Evre 5 (Böbrek yetmezliği)';
  el.textContent = `Tahmini GFR: ${gfr.toFixed(0)} ml/dk/1.73m² — ${stage}`;
}
function calcFluid(){
  const w=parseFloat(document.getElementById('fluid_w').value);
  const el=document.getElementById('fluid_res');
  if(!w){el.textContent='Sonuç için kilo girin.';return;}
  let ml;
  if(w<=10) ml = w*100;
  else if(w<=20) ml = 1000 + (w-10)*50;
  else ml = 1500 + (w-20)*20;
  el.textContent = `Günlük sıvı ihtiyacı: ${ml.toFixed(0)} ml/gün (≈ ${(ml/24).toFixed(1)} ml/saat)`;
}

function normMed(s){ return (s||'').toString().toLocaleLowerCase('tr').replace(/ı/g,'i'); }

  return normMed(m.n).includes(nq) || normMed(m.g).includes(nq) || normMed(m.c).includes(nq) || normMed(m.a).includes(nq);
}
function getFilteredMeds(){

}

/* ============ İLAÇ ETKİLEŞİM KONTROLÜ ============ */
function togglePickMed(name){
  const i = state.interactionPicked.indexOf(name);
  if(i>=0) state.interactionPicked.splice(i,1);
  else if(state.interactionPicked.length<5) state.interactionPicked.push(name);
  state.interactionResult = null;
  render();
}
/* ============================================================
   İLAÇ ETKİLEŞİM KONTROLÜ — YENİDEN TASARLANDI (v2)
   ------------------------------------------------------------
   - Eşleştirme SADECE INTERACTIONS_DB'deki doğrulanmış kayıtlar
     üzerinden yapılır; tahmin/uydurma YOKTUR.
   - Her iki ilaç için de HEM etken madde (g) HEM ticari isim (n)
     HEM de alternatif ticari isimler (a) kontrol edilir, böylece
     "Parol" seçilse de "Vermidon" seçilse de aynı etken madde
     (Parasetamol) üzerinden doğru eşleşme bulunur.
   - Kayıt bulunamazsa uygulama ASLA "birlikte kullanılabilir"
     ya da güven verici yeşil bir işaret göstermez; nötr ⚪ uyarı
     gösterilir (bkz. viewInteractions).
   ============================================================ */
function resolveDrugNames(med){
  const names = [normMed(med.g), normMed(med.n)];
  if(med.a && med.a !== '-'){
    med.a.split(',').forEach(alt=> names.push(normMed(alt.trim())));
  }
  return names.filter(Boolean);
}
function findInteraction(medA, medB){
  const namesA = resolveDrugNames(medA);
  const namesB = resolveDrugNames(medB);
  const matchesKey = (names, key) => {
    const k = normMed(key);
    return names.some(n => n===k || n.includes(k) || k.includes(n));
  };
  return INTERACTIONS_DB.find(x=>
    (matchesKey(namesA, x.drug1) && matchesKey(namesB, x.drug2)) ||
    (matchesKey(namesA, x.drug2) && matchesKey(namesB, x.drug1))
  );
}
function checkInteractions(){
  const picked = state.interactionPicked;
  const results = [];
  for(let i=0;i<picked.length;i++){
    for(let j=i+1;j<picked.length;j++){
      const medA = MEDICATION_DB.find(m=>m.n===picked[i]);
      const medB = MEDICATION_DB.find(m=>m.n===picked[j]);
      if(!medA||!medB) continue;
      const found = findInteraction(medA, medB);
      results.push({a:picked[i], b:picked[j], found});
    }
  }
  state.interactionResult = results;
  render();
}

/* ============ KAN GAZI ANALİZ ARACI ============ */
function calcABG(){
  const ph = parseFloat(document.getElementById('abg_ph').value);
  const paco2 = parseFloat(document.getElementById('abg_paco2').value);
  const hco3 = parseFloat(document.getElementById('abg_hco3').value);
  const pao2 = parseFloat(document.getElementById('abg_pao2').value);
  const na = parseFloat(document.getElementById('abg_na').value);
  const cl = parseFloat(document.getElementById('abg_cl').value);
  const fio2 = parseFloat(document.getElementById('abg_fio2').value);
  const el = document.getElementById('abg_result');
  if(isNaN(ph) || isNaN(paco2) || isNaN(hco3)){
    el.innerHTML = '<div class="abg-result"><div class="abg-line">Analiz için en az pH, PaCO2 ve HCO3 değerlerini girin.</div></div>';
    return;
  }
  const phLow = ph < 7.35, phHigh = ph > 7.45;
  const co2Low = paco2 < 35, co2High = paco2 > 45;
  const hco3Low = hco3 < 22, hco3High = hco3 > 26;
  let primary = '';
  let compensation = '';
  if(!phLow && !phHigh){
    if(co2High && hco3High) primary = 'Tam kompanse edilmiş asit-baz dengesi (pH normal, hem PaCO2 hem HCO3 yüksek — kronik respiratuar asidoz + metabolik kompanzasyon olabilir).';
    else if(co2Low && hco3Low) primary = 'Tam kompanse edilmiş asit-baz dengesi (pH normal, hem PaCO2 hem HCO3 düşük — kronik respiratuar alkaloz + metabolik kompanzasyon olabilir).';
    else primary = 'pH normal aralıkta; belirgin asit-baz bozukluğu saptanmadı.';
  } else if(phLow){
    if(co2High && !hco3Low){ primary = 'Respiratuar Asidoz (Primer)'; compensation = hco3High? 'Kısmen kompanse (metabolik kompanzasyon başlamış)' : 'Kompanse değil (akut)'; }
    else if(hco3Low && !co2High){ primary = 'Metabolik Asidoz (Primer)'; compensation = co2Low? 'Kısmen kompanse (respiratuar kompanzasyon var)' : 'Kompanse değil (akut)'; }
    else if(co2High && hco3Low){ primary = 'Mikst Asidoz (Respiratuar + Metabolik)'; compensation = 'Her iki bileşen de asidoz yönünde; kompanzasyon yetersiz.'; }
    else { primary = 'Asidoz (pH düşük), ama PaCO2/HCO3 beklenen paternle tam uyuşmuyor — klinik bağlamla birlikte değerlendirin.'; }
  } else if(phHigh){
    if(co2Low && !hco3High){ primary = 'Respiratuar Alkaloz (Primer)'; compensation = hco3Low? 'Kısmen kompanse' : 'Kompanse değil (akut)'; }
    else if(hco3High && !co2Low){ primary = 'Metabolik Alkaloz (Primer)'; compensation = co2High? 'Kısmen kompanse' : 'Kompanse değil (akut)'; }
    else if(co2Low && hco3High){ primary = 'Mikst Alkaloz (Respiratuar + Metabolik)'; compensation = 'Her iki bileşen de alkaloz yönünde.'; }
    else { primary = 'Alkaloz (pH yüksek), ama PaCO2/HCO3 beklenen paternle tam uyuşmuyor — klinik bağlamla birlikte değerlendirin.'; }
  }
  let agLine = '';
  if(!isNaN(na) && !isNaN(cl)){
    const ag = na - (cl + hco3);
    agLine = `<div class="abg-line"><b>Anyon Açığı:</b> ${ag.toFixed(1)} mEq/L (normal 8-12) — ${ag>12?'Yüksek anyon açıklı metabolik asidoz düşündürür (laktik asidoz, DKA, üremi, toksin).':'Normal aralıkta.'}</div>`;
  }
  let oxyLine = '';
  if(!isNaN(pao2)){
    let oxyCat = pao2<60?'Ciddi hipoksemi':pao2<80?'Hafif-orta hipoksemi':'Normal oksijenizasyon';
    oxyLine = `<div class="abg-line"><b>Oksijenizasyon:</b> PaO2 ${pao2} mmHg — ${oxyCat}.</div>`;
    if(!isNaN(fio2) && fio2>0){
      const pf = pao2 / (fio2/100);
      let ards = pf<100?'Ağır ARDS':pf<200?'Orta ARDS':pf<300?'Hafif ARDS':'ARDS kriteri yok';
      oxyLine += `<div class="abg-line"><b>P/F Oranı:</b> ${pf.toFixed(0)} — ${ards}.</div>`;
    }
  }
  el.innerHTML = `<div class="abg-result">
    <div class="abg-main">${primary}</div>
    ${compensation? `<div class="abg-line"><b>Kompanzasyon:</b> ${compensation}</div>` : ''}
    <div class="abg-line"><b>pH:</b> ${ph} (normal 7.35-7.45)</div>
    <div class="abg-line"><b>PaCO2:</b> ${paco2} mmHg (normal 35-45)</div>
    <div class="abg-line"><b>HCO3:</b> ${hco3} mEq/L (normal 22-26)</div>
    ${agLine}
    ${oxyLine}
  </div>`;
}
function viewABG(){
  return `
  <div class="backbar"><button class="icon-btn" onclick="goto('home')">←</button><h1>Kan Gazı Analiz Aracı</h1></div>
  <div class="calc-card">
    <div class="calc-title">Kan Gazı Değerlerini Girin</div>
    <div class="calc-row"><label>pH</label><input type="number" step="0.01" id="abg_ph" oninput="calcABG()"/></div>
    <div class="calc-row"><label>PaCO2 (mmHg)</label><input type="number" id="abg_paco2" oninput="calcABG()"/></div>

<!-- ============================================================
     MOBİL KÖPRÜ SCRIPTİ (Capacitor Android entegrasyonu)
     Bu script yukarıdaki uygulama kodunu HİÇBİR ŞEKİLDE değiştirmez.
     Sadece ek/tamamlayıcı işlevler sağlar:
       1) window.storage polyfill (Android WebView'da localStorage ile)
       2) Donanım geri tuşu yönetimi (SPA içi gezinme)
       3) StatusBar/tema senkronizasyonu (karanlık mod)
       4) Splash screen kapatma
       5) Vardiya hatırlatmaları için native yerel bildirimler
     Tarayıcıda (Capacitor olmadan) çalıştırıldığında bu script
     tamamen zararsızdır ve sessizce devre dışı kalır.
     ============================================================ -->
<script>
(function(){
  'use strict';

  /* ---------- 1) ODAK (FOCUS) KORUMA — render() SARMALAYICI (v2: DEBOUNCE) ----------
     Uygulama her tuş vuruşunda #app innerHTML'ini tamamen yeniden
     oluşturuyor (mevcut mimarinin bir parçası). Bu, odaklanmış input
     elemanını yok edip yenisini oluşturduğu için native klavyenin
     her harfte kapanmasına/titremesine yol açıyordu. Basit "render
     sonrası odağı geri yükle" yaklaşımı bazı Android WebView
     sürümlerinde klavye animasyon davranışı yüzünden yeterince
     güvenilir değildi. Bu yüzden KÖKTEN çözüm: kullanıcı bir metin
     kutusunda yazarken render() çağrısı DEBOUNCE edilir (yazma
     duraksayana kadar ~180ms ertelenir). Böylece yeniden çizim artık
     HER HARFTE değil, yazma duraklamasında bir kez tetiklenir; bu da
     klavyenin sürekli titremesini/kapanmasını neredeyse tamamen
     ortadan kaldırır. Odak/imleç geri yükleme mantığı, o tek
     duraksama render'ı için ek güvence olarak korunur. Mevcut
     render() fonksiyonunun kendisi hiç değiştirilmez; yalnızca
     dıştan sarmalanır. */
  if (typeof render === 'function') {
    var __originalRender = render;
    var __renderDebounceTimer = null;

    function __captureFocusInfo(){
      var active = document.activeElement;
      if (!active || (active.tagName !== 'INPUT' && active.tagName !== 'TEXTAREA')) return null;
      return {
        id: active.id || null,
        tag: active.tagName.toLowerCase(),
        cls: active.className || '',
        placeholder: active.placeholder || '',
        selStart: active.selectionStart,
        selEnd: active.selectionEnd
      };
    }
    function __restoreFocus(focusInfo){
      if (!focusInfo) return;
      var target = null;
      if (focusInfo.id) target = document.getElementById(focusInfo.id);
      if (!target) {
        var candidates = document.getElementsByTagName(focusInfo.tag);
        for (var i=0; i<candidates.length; i++){
          var c = candidates[i];
          if ((c.className||'') === focusInfo.cls && (c.placeholder||'') === focusInfo.placeholder) { target = c; break; }
        }
      }
      if (target) {
        try {
          target.focus();
          if (typeof focusInfo.selStart === 'number') target.setSelectionRange(focusInfo.selStart, focusInfo.selEnd);
        } catch(e){}
      }
    }

    render = function(){
      var focusInfo = __captureFocusInfo();
      var isTypingInTextField = !!focusInfo && (
        // arama/metin kutularında yaziyorsa debounce uygula; diger (readonly, time, color vb.) alanlarda anında render
        !document.activeElement.readOnly
      );

      if (isTypingInTextField) {
        // Kullanici hala yaziyor: render'i ertele, her yeni tus vurusunda sayaci sifirla.
        if (__renderDebounceTimer) clearTimeout(__renderDebounceTimer);
        __renderDebounceTimer = setTimeout(function(){
          __renderDebounceTimer = null;
          __originalRender();
          __restoreFocus(focusInfo);
        }, 500);
        return;
      }

      // Metin kutusu odakta degil (buton/menu tiklamasi vb.): her zamanki gibi aninda render et.
      if (__renderDebounceTimer) { clearTimeout(__renderDebounceTimer); __renderDebounceTimer = null; }
      __originalRender();
      __restoreFocus(focusInfo);
    };
  }

  /* ---------- 2) NATIVE BİLDİRİM SHIM'İ (window.Notification) ----------
     Android WebView'da tarayıcının standart Web Notification API'si
     mevcut değildir; uygulamanın "Bildirimleri Etkinleştir" butonu bu
     yüzden "tarayıcı desteklemiyor" hatası veriyordu. Bu shim, tarayıcı
     Notification API'siyle AYNI arayüzü (permission, requestPermission(),
     constructor) sağlayarak, uygulamanın kendi kodunu hiç değiştirmeden,
     mevcut bildirim mantığının Capacitor LocalNotifications eklentisi
     üzerinden gerçek native bildirimlerle çalışmasını sağlar. */
  if (typeof window.Notification === 'undefined' && window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.LocalNotifications) {
    var LN = window.Capacitor.Plugins.LocalNotifications;
    window.Notification = function(title, options){
      options = options || {};
      try {
        LN.schedule({ notifications: [{
          id: Math.floor(Math.random()*1000000),
          title: title,
          body: options.body || '',
          schedule: { at: new Date(Date.now() + 500) }
        }] });
      } catch(e){}
    };
    window.Notification.permission = 'default';
    window.Notification.requestPermission = function(){
      return LN.requestPermissions().then(function(result){
        window.Notification.permission = (result && result.display === 'granted') ? 'granted' : 'denied';
        return window.Notification.permission;
      }).catch(function(){
        window.Notification.permission = 'denied';
        return 'denied';
      });
    };
  }

  /* ---------- Capacitor tespiti ---------- */
  var CAP = window.Capacitor;
  if (!CAP || !CAP.isNativePlatform || !CAP.isNativePlatform()) {
    return; // Normal tarayıcıda çalışıyor: aşağıdaki native entegrasyonları atla.
  }
  var Plugins = CAP.Plugins || {};

  /* ---------- 3) DONANIM GERİ TUŞU ----------
     Uygulama tek sayfa (SPA) mimarisinde olduğu için tarayıcı geçmişi
     yoktur. Geri tuşuna basıldığında: ana sayfada değilsek ana sayfaya
     dön (mevcut global goto() fonksiyonunu kullanarak); ana sayfadaysak
     uygulamadan çık. */
  if (Plugins.App && Plugins.App.addListener) {
    Plugins.App.addListener('backButton', function(){
      try {
        if (typeof state !== 'undefined' && state && state.view && state.view !== 'home') {
          if (typeof goto === 'function') { goto('home'); return; }
        }
        Plugins.App.exitApp();
      } catch(e) {
        Plugins.App.exitApp();
      }
    });
  }

  /* ---------- 4) STATUSBAR / TEMA SENKRONİZASYONU ----------
     Uygulama karanlık modu document.body[data-theme] ile yönetiyor.
     Bu gözlemci, o niteliği izleyip durum çubuğunu (status bar) buna
     göre günceller; uygulamanın kendi kodunu değiştirmeden çalışır. */
  function syncStatusBar(){
    if (!Plugins.StatusBar) return;
    var isDark = document.body.getAttribute('data-theme') === 'dark';
    try {
      Plugins.StatusBar.setBackgroundColor({ color: isDark ? '#101A2E' : '#FFFFFF' });
      Plugins.StatusBar.setStyle({ style: isDark ? 'DARK' : 'LIGHT' });
    } catch(e){}
  }
  syncStatusBar();
  try {
    new MutationObserver(syncStatusBar).observe(document.body, { attributes:true, attributeFilter:['data-theme'] });
  } catch(e){}

  /* ---------- 4b) iOS SAFE AREA (ÇENTİK / DYNAMIC ISLAND) EK GÜVENCESİ ----------
     capacitor.config.json içindeki ios.contentInset:"automatic" ayarı zaten
     WKWebView'ın içeriğini güvenli alana göre kaydırır. Buna ek bir güvenlik
     katmanı olarak, sabit (sticky) üst bar için de safe-area-inset-top
     boşluğu enjekte ediyoruz — mevcut CSS'e dokunmadan, ayrı bir <style>
     etiketiyle. Yalnızca iOS'ta ve yalnızca native ortamda uygulanır. */
  if (CAP.getPlatform && CAP.getPlatform() === 'ios') {
    try {
      var iosSafeAreaStyle = document.createElement('style');
      iosSafeAreaStyle.textContent = '.topbar{padding-top:calc(10px + env(safe-area-inset-top)) !important;}';
      document.head.appendChild(iosSafeAreaStyle);
    } catch(e){}
  }

  /* ---------- 5) SPLASH SCREEN KAPATMA ---------- */
  if (Plugins.SplashScreen && Plugins.SplashScreen.hide) {
    setTimeout(function(){ try{ Plugins.SplashScreen.hide(); }catch(e){} }, 300);
  }

  /* ---------- 6) VARDİYA HATIRLATMALARI (Native Yerel Bildirim) ----------
     Web sürümünde bildirimler yalnızca sekme açıkken çalışabiliyordu.
     Native ortamda LocalNotifications eklentisiyle uygulama kapalıyken
     de bildirim gönderilebilir. Bu fonksiyon, uygulamanın kendi
     state.shifts / SHIFT_START_HOUR global verilerini okuyarak
     (mevcut koda dokunmadan) her vardiya başlangıcından 12 saat önce
     bir yerel bildirim zamanlar. */
  function scheduleShiftNotifications(){
    if (!Plugins.LocalNotifications) return;
    if (typeof state === 'undefined' || !state.shifts) return;
    if (typeof normalizeShift === 'undefined') return;

    Plugins.LocalNotifications.requestPermissions().then(function(){
      Plugins.LocalNotifications.getPending().then(function(pending){
        var pendingIds = (pending && pending.notifications || []).map(function(n){ return n.id; });
        return Plugins.LocalNotifications.cancel({ notifications: pendingIds.map(function(id){ return {id:id}; }) })
          .catch(function(){})
          .then(function(){ return pending; });
      }).then(function(){
        var toSchedule = [];
        var now = Date.now();
        Object.keys(state.shifts).forEach(function(dateStr, idx){
          var shift = normalizeShift(state.shifts[dateStr]);
          if (!shift || !shift.start) return;
          var start = new Date(dateStr + 'T' + shift.start + ':00');
          var notifyAt = new Date(start.getTime() - 12*3600*1000);
          if (notifyAt.getTime() > now) {
            toSchedule.push({
              id: idx + 1,
              title: 'Yaklaşan Nöbet',
              body: (typeof formatDateLabelTR === 'function' ? formatDateLabelTR(dateStr) : dateStr) + ' - ' + shift.label + ' vardiyanız 12 saat sonra başlıyor.',
              schedule: { at: notifyAt }
            });
          }
        });
        if (toSchedule.length) {
          Plugins.LocalNotifications.schedule({ notifications: toSchedule }).catch(function(){});
        }
      });
    }).catch(function(){});
  }
  // İlk açılışta ve uygulama her ön plana geldiğinde vardiya bildirimlerini yeniden planla
  setTimeout(scheduleShiftNotifications, 1500);
  if (Plugins.App && Plugins.App.addListener) {
    Plugins.App.addListener('appStateChange', function(st){
      if (st && st.isActive) setTimeout(scheduleShiftNotifications, 800);
    });
  }

  /* ============================================================
     7) GOOGLE ADMOB + FIREBASE ANALYTICS MODÜLÜ
     ------------------------------------------------------------
     - @capacitor-community/admob eklentisi üzerinden banner, geçiş
       (interstitial) ve ödüllü (rewarded) reklam yönetimi.
     - Reklam kimlikleri (ad unit ID'leri) ad-config.json dosyasından
       CI derlemesinde otomatik olarak buraya enjekte edilir
       (bkz. scripts/patch-ads.py). Aşağıdaki değerler VARSAYILAN
       olarak Google'ın resmi TEST reklam kimlikleridir.
     - Premium kullanıcılarda ve state.adEnabled=false durumunda
       hiçbir reklam çağrısı yapılmaz.
     - CPR/acil müdahale, ilaç dozu ve hesaplayıcı sayfalarında
       (isAdSensitiveView()) geçiş reklamı ASLA gösterilmez.
     ============================================================ */
  (function(){
    // ---- AD_CONFIG_START (scripts/patch-ads.py bu blogu ad-config.json'dan uretir) ----
    var AD_CONFIG = {
      testMode: true,
      android: {"appId": "ca-app-pub-3940256099942544~3347511713", "bannerId": "ca-app-pub-3940256099942544/6300978111", "interstitialId": "ca-app-pub-3940256099942544/1033173712", "rewardedId": "ca-app-pub-3940256099942544/5224354917"},
      ios: {"appId": "ca-app-pub-3940256099942544~1458002511", "bannerId": "ca-app-pub-3940256099942544/2934735716", "interstitialId": "ca-app-pub-3940256099942544/4411468910", "rewardedId": "ca-app-pub-3940256099942544/1712485313"}
    };
    // ---- AD_CONFIG_END ----

    if (!Plugins.AdMob) return; // Eklenti yoksa (henuz sync edilmediyse) sessizce devre disi kal.
    var AdMob = Plugins.AdMob;
    var FirebaseAnalytics = Plugins.FirebaseAnalytics || null;
    var platform = (CAP.getPlatform && CAP.getPlatform()) === 'ios' ? 'ios' : 'android';
    var cfg = AD_CONFIG[platform];

    var adsInitialized = false;
    var interstitialReady = false;
    var rewardedReady = false;
    var lastKnownView = null;
    var MIN_INTERSTITIAL_GAP_MS = 3 * 60 * 1000; // en az 3 dakika
    var MIN_SECTIONS_BEFORE_AD = 3 + Math.floor(Math.random() * 3); // 3-5 farkli bolum gezildikten sonra (rastgele)
    var sessionStartAt = Date.now();
    var STARTUP_GRACE_MS = 20 * 1000; // uygulama acilir acilmaz reklam gosterme

    function logEvent(name, params){
      if (!FirebaseAnalytics) return;
      try { FirebaseAnalytics.logEvent({ name: name, params: params || {} }); } catch(e){}
    }

    function isOnline(){
      try { return navigator.onLine !== false; } catch(e){ return true; }
    }

    function adsEffectivelyEnabled(){
      if (typeof state === 'undefined') return false;
      if (state.premium) return false;
      if (state.adEnabled === false) return false;
      if (!isOnline()) return false;
      return true;
    }

    /* ---------- Başlatma ---------- */
    function initAds(){
      if (adsInitialized) return Promise.resolve();
      return AdMob.initialize({
        requestTrackingAuthorization: true,
        initializeForTesting: !!AD_CONFIG.testMode
      }).then(function(){
        adsInitialized = true;
        prepareInterstitial();
        prepareRewarded();
      }).catch(function(){});
    }

    /* ---------- GDPR/UMP RIZA YÖNETİMİ (Google User Messaging Platform) ----------
       AB/İngiltere/İsviçre kullanıcıları için Google, reklam gösterilmeden
       önce rıza formu gösterilmesini ZORUNLU kılar (aksi halde AdMob
       hesabı politika ihlali nedeniyle askıya alınabilir). Bu akış:
       1) Kullanıcının bölgesine göre rıza gerekip gerekmediğini sorar
          (requestConsentInfo — konum tespiti Google tarafında yapılır).
       2) Gerekiyorsa Google'ın standart rıza formunu gösterir.
       3) Form tamamlandıktan/gerekmediği belirlendikten SONRA reklam
          SDK'sı başlatılır — asla rızadan önce reklam çağrısı yapılmaz.
       4) Kullanıcının tercihini daha sonra değiştirebilmesi için
          window.showPrivacyOptionsForm() dışa açılır (Ayarlar ekranından
          "Gizlilik Tercihleri" butonuyla çağrılabilir — bu da Google'ın
          politika gereğidir).
       Eklenti bu API'leri desteklemiyorsa (eski sürüm), akış sessizce
       atlanır ve doğrudan initAds() çağrılır; uygulama hata vermez. */
    var consentHandled = false;
    function requestConsentThenInitAds(){
      if (!AdMob.requestConsentInfo) {
        // Eklenti surumu UMP desteklemiyor; guvenli sekilde dogrudan devam et.
        return initAds();
      }
      return AdMob.requestConsentInfo({ tagForUnderAgeOfConsent: false }).then(function(consentInfo){
        var REQUIRED = 1; // ConsentStatus.REQUIRED (eklenti enum degeri)
        if (consentInfo && consentInfo.isConsentFormAvailable && consentInfo.status === REQUIRED) {
          return AdMob.showConsentForm().catch(function(){});
        }
      }).catch(function(){
        // Riza bilgisi alinamadi (agsiz, eklenti hatasi vb.); guvenli tarafta kalinip devam edilir.
      }).then(function(){
        consentHandled = true;
        return initAds();
      });
    }
    /* Ayarlar ekranindan "Gizlilik Tercihleri" ile cagrilabilir; kullanici
       rizasini istedigi zaman gozden gecirip degistirebilir (Google zorunlu tutar). */
    window.showPrivacyOptionsForm = function(){
      if (AdMob.showPrivacyOptionsForm) {
        AdMob.showPrivacyOptionsForm().catch(function(){});
      }
    };

    /* ---------- Geçiş (Interstitial) Reklam ---------- */
    function prepareInterstitial(){
      if (!adsEffectivelyEnabled()) return;
      AdMob.prepareInterstitial({ adId: cfg.interstitialId, isTesting: !!AD_CONFIG.testMode })
        .then(function(){ interstitialReady = true; })
        .catch(function(){ interstitialReady = false; });
    }
    function maybeShowInterstitial(){
      if (!adsEffectivelyEnabled()) return;
      if (!interstitialReady) return;
      if (Date.now() - sessionStartAt < STARTUP_GRACE_MS) return; // uygulama acilir acilmaz gosterme
      if (typeof isAdSensitiveView === 'function' && isAdSensitiveView()) return; // CPR/doz/hesaplayici sayfalarinda gosterme
      if (typeof state === 'undefined') return;
      if ((state.sectionVisitCount || 0) < MIN_SECTIONS_BEFORE_AD) return; // yeterli sayida bolum gezilmedi
      if (Date.now() - (state.lastInterstitialAt || 0) < MIN_INTERSTITIAL_GAP_MS) return; // art arda / cok sik gosterme

      AdMob.showInterstitial().then(function(){
        state.lastInterstitialAt = Date.now();
        state.sectionVisitCount = 0; // sayaci sifirla, bir sonraki reklam icin yeniden say
        MIN_SECTIONS_BEFORE_AD = 3 + Math.floor(Math.random() * 3); // bir sonraki esigi yeniden rastgele belirle (3-5)
        interstitialReady = false;
        logEvent('interstitial_shown', { screen: state.view || 'unknown' });
        // Kapandiktan sonra kullanicinin kaldigi sayfada devam etmesi icin ekstra
        // bir islem gerekmez (Capacitor AdMob native overlay olarak gosterir,
        // WebView/uygulama durumu degismez); bir sonraki reklami hemen hazirla.
        prepareInterstitial();
      }).catch(function(){
        interstitialReady = false;
        prepareInterstitial();
      });
    }

    /* ---------- Ödüllü (Rewarded) Reklam ----------
       İleride "Premium makaleyi ücretsiz aç", "PDF indir" gibi özellikler
       için hazır altyapı. Çağıran kod şu şekilde kullanabilir:
         window.showRewardedAd(function(){ /* ödül burada aktive edilir *\/ });
    */
    function prepareRewarded(){
      if (!adsEffectivelyEnabled()) return;
      AdMob.prepareRewardVideoAd({ adId: cfg.rewardedId, isTesting: !!AD_CONFIG.testMode })
        .then(function(){ rewardedReady = true; })
        .catch(function(){ rewardedReady = false; });
    }
    window.showRewardedAd = function(onRewardEarned, onUnavailable){
      if (!adsEffectivelyEnabled() || !rewardedReady) {
        if (typeof onUnavailable === 'function') onUnavailable();
        return;
      }
      var rewardListener = AdMob.addListener('onRewardedVideoAdReward', function(){
        logEvent('rewarded_ad_completed', { screen: (state && state.view) || 'unknown' });
        if (typeof onRewardEarned === 'function') onRewardEarned();
        try { rewardListener.remove(); } catch(e){}
      });
      AdMob.showRewardVideoAd().catch(function(){
        if (typeof onUnavailable === 'function') onUnavailable();
      }).finally(function(){
        rewardedReady = false;
        prepareRewarded();
      });
    };

    /* ---------- Premium/Ayar değişikliklerini dinleme ---------- */
    window.__adsBridgeOnPremiumChange = function(isPremium){
      if (!isPremium) { prepareInterstitial(); prepareRewarded(); }
      logEvent('premium_status_changed', { premium: !!isPremium });
    };
    window.__adsBridgeOnSettingsChange = function(){
      if (adsEffectivelyEnabled()) { if(!interstitialReady) prepareInterstitial(); if(!rewardedReady) prepareRewarded(); }
    };

    /* ---------- Sayfa geçişlerini izleme (render() sarmalayıcısına ek) ----------
       Odak koruma bölümünde (1) render() zaten sarmalanmıştı; burada aynı
       fonksiyonu TEKRAR sarmalamak yerine, her render sonrasında çalışacak
       hafif bir kontrol mekanizması kullanıyoruz (MutationObserver ile
       #app içeriğinin değiştiğini izleyerek), boylece render() birden
       fazla kez sarmalanmis olmuyor. */
    function onAppContentChanged(){
      if (typeof state === 'undefined') return;
      if (state.view !== lastKnownView) {
        lastKnownView = state.view;
        logEvent('screen_view', { screen_name: state.view || 'unknown' });
        maybeShowInterstitial();
      }
    }
    var appEl = document.getElementById('app');
    if (appEl) {
      try {
        new MutationObserver(onAppContentChanged).observe(appEl, { childList: true, subtree: false });
      } catch(e){}
    }

    /* ---------- Oturum süresi takibi (Analytics) ---------- */
    var sessionLogged = false;
    if (Plugins.App && Plugins.App.addListener) {
      Plugins.App.addListener('appStateChange', function(st){
        if (st && !st.isActive && !sessionLogged) {
          sessionLogged = true;
          logEvent('session_duration', { seconds: Math.round((Date.now() - sessionStartAt) / 1000) });
        }
        if (st && st.isActive) { sessionLogged = false; }
      });
    }

    /* ---------- Başlat ---------- */
    setTimeout(function(){
      requestConsentThenInitAds();
    }, 800);
  })();
})();
</script>
